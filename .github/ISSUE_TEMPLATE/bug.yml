name: Bug Report
description: Report something that is broken
title: "[Bug] "
labels: ["type:bug", "status:triage", "priority:high"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Pricing Engine
        - Data Model
        - API
        - UI
        - Promotions
        - Billback
        - Documentation
        - CI/CD
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (system down)
        - High (major feature broken)
        - Medium (workaround exists)
        - Low (cosmetic/minor)
    validations:
      required: true
