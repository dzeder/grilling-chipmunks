version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    allow:
      - dependency-type: "direct"
  - package-ecosystem: "npm_and_yarn"
    directory: "/integrations/marketplace-ui"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    allow:
      - dependency-type: "direct"
  - package-ecosystem: "npm_and_yarn"
    directory: "/.claude/skills/gstack"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    allow:
      - dependency-type: "direct"
