# Reusable workflow template for Python jobs

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.12'
      command:
        type: string
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install -r requirements.txt
      - run: ${{ inputs.command }}
