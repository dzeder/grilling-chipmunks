name: Lint & Format Agent

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check shell scripts for syntax errors
        id: shellcheck
        run: |
          errors=0
          while IFS= read -r -d '' script; do
            if ! bash -n "$script" 2>/tmp/shellcheck-err.txt; then
              echo "::error file=$script::Syntax error in $script"
              cat /tmp/shellcheck-err.txt
              errors=$((errors + 1))
            fi
          done < <(find scripts/ -name "*.sh" -print0 2>/dev/null)
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors shell script(s) have syntax errors"
            exit 1
          fi
          echo "All shell scripts passed syntax check."

      - name: Check for trailing whitespace
        run: |
          if git diff --check HEAD~1 2>/dev/null; then
            echo "No trailing whitespace issues."
          else
            echo "::warning::Some files have trailing whitespace"
          fi
        continue-on-error: true

      - name: Validate YAML files
        run: |
          pip install pyyaml -q
          python3 -c "
          import yaml, glob, sys
          errors = 0
          for f in glob.glob('.github/**/*.yml', recursive=True):
              try:
                  yaml.safe_load(open(f))
              except yaml.YAMLError as e:
                  print(f'::error file={f}::{e}')
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'All YAML files are valid.')
          "
