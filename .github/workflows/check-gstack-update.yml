name: Check gstack upstream updates

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/check-gstack-update.yml'

concurrency:
  group: gstack-check
  cancel-in-progress: true

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check upstream version
        id: check
        run: |
          LOCAL_VERSION=$(cat .claude/skills/gstack/VERSION 2>/dev/null || echo "unknown")
          UPSTREAM_VERSION=$(curl -sL https://raw.githubusercontent.com/garrytan/gstack/main/VERSION 2>/dev/null || echo "unknown")
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VERSION" != "$UPSTREAM_VERSION" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update gstack
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git clone --depth 1 https://github.com/garrytan/gstack.git /tmp/gstack-upstream
          rm -rf /tmp/gstack-upstream/.git
          rm -f /tmp/gstack-upstream/bin/gstack-global-discover
          rsync -av --delete \
            --exclude='dist/' \
            --exclude='node_modules/' \
            --exclude='gstack-global-discover' \
            /tmp/gstack-upstream/ .claude/skills/gstack/

      - name: Normalize gstack symlinks
        if: steps.check.outputs.needs_update == 'true'
        run: bash scripts/fix-gstack-symlinks.sh

      - name: Create or update PR
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_VER: ${{ steps.check.outputs.upstream }}
          LOCAL_VER: ${{ steps.check.outputs.local }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-gstack-${UPSTREAM_VER}"

          # If a PR already exists for this version, force-update it
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for ${BRANCH}, updating..."
            git checkout -b "$BRANCH"
            git add .claude/skills/gstack/ .claude/skills/*/SKILL.md
            git commit -m "chore: update gstack from ${LOCAL_VER} to ${UPSTREAM_VER}"
            git push origin "$BRANCH" --force
            echo "Updated existing PR #${EXISTING_PR}"
            exit 0
          fi

          # Delete stale remote branch if it exists without a PR
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add .claude/skills/gstack/ .claude/skills/*/SKILL.md
          git commit -m "chore: update gstack from ${LOCAL_VER} to ${UPSTREAM_VER}"
          git push origin "$BRANCH"
          {
            echo "## Summary"
            echo "- gstack upstream released **${UPSTREAM_VER}** (we have **${LOCAL_VER}**)"
            echo "- Auto-detected by weekly check against garrytan/gstack"
            echo ""
            echo "## Review"
            echo "- Check the diff for breaking changes to skills you use"
            echo "- After merging, run \`cd .claude/skills/gstack && ./setup\` to rebuild the browser binary"
            echo ""
            echo "## Test plan"
            echo "- [ ] Review CHANGELOG for breaking changes"
            echo "- [ ] Verify skill names haven't changed"
            echo "- [ ] Rebuild browser binary after merge"
          } > /tmp/pr-body.md
          gh pr create \
            --title "Update gstack to ${UPSTREAM_VER}" \
            --body-file /tmp/pr-body.md
