name: Stale Agent

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

concurrency:
  group: stale
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f  # v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please comment or update it.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          close-issue-message: "Closed due to inactivity. Reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Reopen if still relevant."
          days-before-stale: 30
          days-before-close: 14
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-issue-label: "status:stale"
          stale-pr-label: "status:stale"
          exempt-issue-labels: "priority:critical,priority:high,status:blocked"
          exempt-pr-labels: "priority:critical,priority:high,status:blocked"
