name: Ecosystem Watch

on:
  schedule:
    - cron: '0 10 1,15 * *'  # 1st and 15th of each month at 10am UTC
  workflow_dispatch:

jobs:
  check-ecosystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check ecosystem repos for changes
        id: check
        run: |
          bash scripts/check-ecosystem.sh --json 2>&1 | tee /tmp/ecosystem-output.txt
          if grep -q "NEW:" /tmp/ecosystem-output.txt; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Extract digest between === Digest === and end
            DIGEST=$(sed -n '/^=== Digest ===/,$ p' /tmp/ecosystem-output.txt | tail -n +3)
            # Write to file for multiline output
            echo "$DIGEST" > /tmp/ecosystem-digest.md
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing open issue
        if: steps.check.outputs.has_changes == 'true'
        id: existing
        run: |
          EXISTING=$(gh issue list --label "ecosystem-watch" --state open --limit 1 --json number -q '.[0].number' || echo "")
          echo "issue_number=$EXISTING" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create ecosystem digest issue
        if: steps.check.outputs.has_changes == 'true' && steps.existing.outputs.issue_number == ''
        run: |
          DIGEST=$(cat /tmp/ecosystem-digest.md)
          gh issue create \
            --title "Ecosystem Watch: upstream changes detected ($(date +%Y-%m-%d))" \
            --label "ecosystem-watch" \
            --body "## Ecosystem Changes Detected

          The following monitored repos have new commits since the last check.

          Review for relevant patterns, harness features, or conventions worth adopting.

          ${DIGEST}

          ## Action Required

          For each repo with changes:
          1. Skim the commit log for anything relevant to Cheyenne
          2. If useful, open a follow-up PR to adopt the pattern
          3. If nothing relevant, close this issue

          *Auto-generated by ecosystem watch workflow*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
