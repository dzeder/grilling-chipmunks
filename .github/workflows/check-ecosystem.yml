name: Ecosystem Watch

on:
  schedule:
    - cron: '0 10 1,15 * *'  # 1st and 15th of each month at 10am UTC
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/check-ecosystem.yml'

concurrency:
  group: ecosystem-check
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  check-ecosystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check ecosystem repos for changes
        id: check
        run: |
          bash scripts/check-ecosystem.sh --json 2>&1 | tee /tmp/ecosystem-output.txt
          if grep -q "NEW:" /tmp/ecosystem-output.txt; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Extract digest between === Digest === and end
            DIGEST=$(sed -n '/^=== Digest ===/,$ p' /tmp/ecosystem-output.txt | tail -n +3)
            # Write to file for multiline output
            echo "$DIGEST" > /tmp/ecosystem-digest.md
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure label exists
        if: steps.check.outputs.has_changes == 'true'
        run: gh label create ecosystem-watch --description "Ecosystem watch digest" --color "0e8a16" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing open issue
        if: steps.check.outputs.has_changes == 'true'
        id: existing
        run: |
          EXISTING=$(gh issue list --label "ecosystem-watch" --state open --limit 1 --json number -q '.[0].number' || echo "")
          echo "issue_number=$EXISTING" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create ecosystem digest issue
        if: steps.check.outputs.has_changes == 'true' && steps.existing.outputs.issue_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Ecosystem Changes Detected"
            echo ""
            echo "The following monitored repos have new commits since the last check."
            echo ""
            echo "Review for relevant patterns, harness features, or conventions worth adopting."
            echo ""
            cat /tmp/ecosystem-digest.md
            echo ""
            echo "## Action Required"
            echo ""
            echo "For each repo with changes:"
            echo "1. Skim the commit log for anything relevant"
            echo "2. If useful, open a follow-up PR to adopt the pattern"
            echo "3. If nothing relevant, close this issue"
            echo ""
            echo "*Auto-generated by ecosystem watch workflow*"
          } > /tmp/ecosystem-issue-body.md
          gh issue create \
            --title "Ecosystem Watch: upstream changes detected ($(date +%Y-%m-%d))" \
            --label "ecosystem-watch" \
            --body-file /tmp/ecosystem-issue-body.md
