# Trigger: push with scope aws/cdk, or manual
# Jobs: CDK synth → Checkov → diff comment → staging → approval → prod
# Requires: skills/aws/cdk/package.json to exist (skips gracefully if CDK not initialized)

name: AWS Deploy

on:
  push:
    paths:
      - 'skills/aws/cdk/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: skills/aws/cdk

jobs:
  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check CDK project exists
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::No package.json in skills/aws/cdk/ — CDK project not initialized yet. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: '20'
      - run: npm ci
        if: steps.check.outputs.skip != 'true'
      - run: npx cdk synth
        if: steps.check.outputs.skip != 'true'
      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.skip != 'true'
        with:
          name: cdk-output
          path: skills/aws/cdk/cdk.out/

  security-scan:
    needs: cdk-synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: cdk-output
          path: cdk.out/
        continue-on-error: true
      - uses: bridgecrewio/checkov-action@master
        if: hashFiles('cdk.out/') != ''
        with:
          directory: cdk.out/

  deploy-staging:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - name: Check CDK project exists
        id: check
        run: test -f package.json && echo "skip=false" >> "$GITHUB_OUTPUT" || echo "skip=true" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: '20'
      - run: npm ci
        if: steps.check.outputs.skip != 'true'
      - run: npx cdk deploy --all --require-approval never
        if: steps.check.outputs.skip != 'true'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Check CDK project exists
        id: check
        run: test -f package.json && echo "skip=false" >> "$GITHUB_OUTPUT" || echo "skip=true" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: '20'
      - run: npm ci
        if: steps.check.outputs.skip != 'true'
      - run: npx cdk deploy --all --require-approval never
        if: steps.check.outputs.skip != 'true'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_PROD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_PROD_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
