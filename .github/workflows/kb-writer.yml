name: Knowledge Base Writer

on:
  issues:
    types: [labeled]

jobs:
  write-to-kb:
    if: github.event.label.name == 'kb-approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install anthropic httpx pyyaml

      - name: Process approved issue
        run: python scripts/kb-writer.py --issue ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
