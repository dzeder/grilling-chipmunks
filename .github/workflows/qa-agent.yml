name: QA Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -e ".[dev]" 2>/dev/null || echo "No Python package to install"

      - name: Run tests
        id: tests
        run: |
          if [ -d tests/ ] && find tests/ -name "*.py" -print -quit | grep -q .; then
            if [ -f pytest.ini ] || [ -f pyproject.toml ]; then
              python -m pytest tests/ -v --tb=short 2>&1
            else
              python -m pytest tests/ -v --tb=short 2>&1 || true
            fi
          else
            echo "No Python tests found — skipping"
          fi

      - name: Validate integration patterns
        run: |
          errors=0
          for js in integrations/patterns/*.js; do
            if [ -f "$js" ]; then
              node --check "$js" 2>/dev/null || {
                echo "::error file=$js::Syntax error in $js"
                errors=$((errors + 1))
              }
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors JS pattern file(s) have syntax errors"
            exit 1
          fi
          echo "All integration patterns passed syntax check."

      - name: Add agent label
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['agent:qa']
            });
