name: QA Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests with coverage
        id: tests
        run: npm test -- --coverage --reporter=json --outputFile=test-results.json
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Post coverage comment
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = '## 🤖 QA Agent Report\n\n';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              body += '### Coverage Summary\n\n';
              body += '| Metric | Coverage |\n|--------|----------|\n';
              body += `| Statements | ${total.statements.pct}% |\n`;
              body += `| Branches | ${total.branches.pct}% |\n`;
              body += `| Functions | ${total.functions.pct}% |\n`;
              body += `| Lines | ${total.lines.pct}% |\n\n`;
              if (total.lines.pct < 80) {
                body += '⚠️ **Line coverage is below 80% threshold**\n\n';
              }
            } catch (e) {
              body += '⚠️ Could not read coverage report\n\n';
            }
            const testResult = '${{ steps.tests.outcome }}';
            const emoji = testResult === 'success' ? '✅' : '❌';
            body += `### Test Result: ${emoji} ${testResult}\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Add agent label
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['agent:qa']
            });

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

