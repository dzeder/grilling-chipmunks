name: QA Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install pytest -q
          pip install -e ".[dev]" 2>/dev/null || echo "No Python package extras to install"

      - name: Run tests
        id: tests
        run: |
          if [ -d tests/ ] && find tests/ -name "*.py" -print -quit | grep -q .; then
            # Some tests require sf CLI or other tools not available in CI.
            # Run all tests but treat failures as warnings, not blockers.
            python -m pytest tests/ -v --tb=short 2>&1 || {
              echo "::warning::Some tests failed — likely tests requiring sf CLI or external tools"
            }
          else
            echo "No Python tests found — skipping"
          fi

      - name: Validate integration patterns
        run: |
          errors=0
          for js in integrations/patterns/*.js; do
            if [ -f "$js" ]; then
              node --check "$js" 2>/dev/null || {
                echo "::error file=$js::Syntax error in $js"
                errors=$((errors + 1))
              }
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors JS pattern file(s) have syntax errors"
            exit 1
          fi
          echo "All integration patterns passed syntax check."

      - name: Add agent label
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['agent:qa']
            });
