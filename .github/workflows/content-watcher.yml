# Trigger: cron "0 6 * * *"
# Jobs: check all sources in content-sources.yaml, create GitHub issues

name: Content Watcher

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scan-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - run: pip install anthropic feedparser httpx pyyaml google-api-python-client beautifulsoup4 requests
      - run: python skills/content-watcher/monitor/fetch-content.py
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
      PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
