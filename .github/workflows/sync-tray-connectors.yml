name: Sync Tray Connectors

on:
  schedule:
    - cron: '0 9 1 * *'  # Monthly, 1st of month, 9am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync Tray connector catalog
        run: bash scripts/sync-tray-connectors.sh --apply --workspace
        env:
          TRAY_MASTER_TOKEN: ${{ secrets.TRAY_MASTER_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge-base/tray/
          git diff --cached --quiet || git commit -m "chore: refresh Tray connector catalog [skip ci]"
          git push
