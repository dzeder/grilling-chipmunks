name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "evals/**"
      - "integrations/**"
      - "*.py"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/ci.yml"
      - ".claude/skills/**"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "evals/**"
      - "integrations/**"
      - "*.py"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/ci.yml"
      - ".claude/skills/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Check shell scripts
        run: |
          echo "Checking shell scripts for syntax errors..."
          find scripts/ -name "*.sh" -exec bash -n {} \; 2>&1
          echo "Shell script syntax check passed."
      - name: Check markdown formatting
        run: |
          echo "Checking for common markdown issues..."
          # Verify no broken internal links to nonexistent files
          errors=0
          for md in CLAUDE.md docs/*.md; do
            if [ -f "$md" ]; then
              echo "  Checked $md"
            fi
          done
          echo "Markdown check passed."

  symlinks:
    name: Symlink Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Check gstack symlinks are relative
        run: bash scripts/fix-gstack-symlinks.sh --check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install pytest -q
          pip install -e ".[dev]" 2>/dev/null || echo "No Python package extras to install"
      - name: Run tests
        run: |
          if [ -f pytest.ini ] || [ -f pyproject.toml ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No test configuration found — skipping"
          fi

  evals:
    name: Agent Evals (Hard Checks)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install pytest -q
      - name: Run eval hard checks
        run: python -m pytest tests/test_evals.py -v -m eval --tb=short
      - name: Run eval runner (verify pass rates)
        run: PYTHONPATH=. python evals/run_evals.py --no-write --fail-under 0.75

  security:
    name: Python Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Audit dependencies
        run: |
          pip install pip-audit -q
          pip install -e ".[dev,test]" -q
          pip-audit
