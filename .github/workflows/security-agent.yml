name: Security Agent

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for secrets
        run: |
          echo "Checking for potential secrets in tracked files..."
          patterns='(PRIVATE.KEY|password\s*=\s*["\x27][^"\x27]+|api_key\s*=\s*["\x27][^"\x27]+|secret\s*=\s*["\x27][^"\x27]+)'
          if git diff --name-only HEAD~1 2>/dev/null | xargs grep -lEi "$patterns" 2>/dev/null; then
            echo "::warning::Potential secrets detected in changed files — please review"
          else
            echo "No obvious secrets found in changed files."
          fi
        continue-on-error: true

      - name: Check for sensitive file patterns
        run: |
          sensitive_files=(.env .env.local credentials.json service-account.json *.pem *.key)
          found=0
          for pattern in "${sensitive_files[@]}"; do
            if git ls-files "$pattern" 2>/dev/null | grep -q .; then
              echo "::warning::Sensitive file pattern found: $pattern"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No sensitive files found in repo."
          fi

      - name: Check JS patterns for known issues
        run: |
          errors=0
          for js in integrations/patterns/*.js; do
            if [ -f "$js" ]; then
              # Check for eval() usage
              if grep -n 'eval(' "$js" 2>/dev/null; then
                echo "::warning file=$js::eval() usage found"
                errors=$((errors + 1))
              fi
            fi
          done
          echo "JS security scan complete. $errors issue(s) found."
        continue-on-error: true

      - name: Post security report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['agent:security']
            });
