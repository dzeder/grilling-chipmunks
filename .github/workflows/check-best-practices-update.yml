name: Check Claude Code Best Practices Update

on:
  schedule:
    - cron: '0 10 * * 3'  # Wednesdays at 10am UTC
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/check-best-practices-update.yml'

concurrency:
  group: best-practices-check
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check for upstream changes
        id: check
        run: |
          CURRENT_HASH=$(cat references/claude-code-best-practices/VERSION | tr -d '[:space:]')
          UPSTREAM_HASH=$(git ls-remote https://github.com/shanraisshan/claude-code-best-practice.git HEAD | cut -f1)
          echo "current=$CURRENT_HASH" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM_HASH" >> $GITHUB_OUTPUT
          if [ "$CURRENT_HASH" != "$UPSTREAM_HASH" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply update
        if: steps.check.outputs.needs_update == 'true'
        run: bash scripts/update-best-practices.sh --apply

      - name: Create PR
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update claude-code-best-practices from upstream"
          title: "Update Claude Code Best Practices"
          body: |
            Upstream `shanraisshan/claude-code-best-practice` has new commits.

            **Previous:** `${{ steps.check.outputs.current }}`
            **New:** `${{ steps.check.outputs.upstream }}`

            Review the diff and merge if the changes look good.
          branch: update-best-practices
          delete-branch: true
