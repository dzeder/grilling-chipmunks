<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title$ — Ohanafy Pricing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;400;700&display=swap" rel="stylesheet">
  <style>
    /* === Ohanafy 2025 Brand Styles === */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --true-black: #000000;
      --true-white: #FFFFFF;
      --mellow: #E4F223;
      --cork: #F4F2F0;
      --dark-denim: #4A5F80;
      --light-denim: #B1C7EB;
      --dark-grey: #545454;
    }

    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--true-black);
      background: var(--cork);
    }

    /* --- Header Banner --- */
    .brand-header {
      width: 100%;
      background: var(--true-black);
      padding: 2.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .brand-header::after {
      content: '';
      position: absolute;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
      height: 120px;
      background-image: url('https://40881726.fs1.hubspotusercontent-na1.net/hubfs/40881726/Brand%20Assets/Ohanafy%20Black%20Emblem.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.3;
      filter: invert(1);
    }

    .brand-header .tagline {
      font-family: 'Geist', system-ui, sans-serif;
      font-weight: 700;
      font-size: 1.75rem;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
    }

    .brand-header .tagline .highlight {
      color: var(--mellow);
    }

    .brand-header .tagline .brand-name {
      color: var(--true-white);
    }

    /* --- Main Content --- */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      background: var(--true-white);
      min-height: calc(100vh - 200px);
    }

    .doc-title {
      font-size: 36px;
      font-weight: 100;
      color: var(--true-black);
      margin-bottom: 0.5rem;
      border-bottom: 3px solid var(--dark-denim);
      padding-bottom: 1rem;
    }

    /* --- Typography --- */
    h1 { font-size: 24px; font-weight: 400; color: var(--true-black); margin: 2rem 0 1rem; }
    h2 { font-size: 18px; font-weight: 700; color: var(--dark-denim); margin: 1.75rem 0 0.75rem; }
    h3 { font-size: 16px; font-weight: 700; color: var(--dark-denim); margin: 1.5rem 0 0.5rem; }
    p  { margin: 0 0 1rem; }
    a  { color: var(--dark-denim); text-decoration: underline; }
    a:hover { color: var(--true-black); }

    ul, ol { margin: 0 0 1rem 1.5rem; }
    li { margin-bottom: 0.35rem; }

    code {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.9em;
      background: var(--cork);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    pre {
      background: var(--cork);
      padding: 1rem 1.25rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0 0 1rem;
      border-left: 3px solid var(--dark-denim);
    }

    pre code { background: none; padding: 0; }

    blockquote {
      border-left: 4px solid var(--mellow);
      padding: 0.75rem 1.25rem;
      margin: 0 0 1rem;
      background: var(--cork);
      color: var(--dark-grey);
    }

    hr {
      border: none;
      height: 1px;
      background: var(--cork);
      margin: 2rem 0;
    }

    /* --- Tables --- */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 15px;
    }

    thead th {
      background: var(--dark-denim);
      color: var(--true-white);
      font-weight: 700;
      text-align: left;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--dark-denim);
    }

    tbody td {
      background: var(--cork);
      color: var(--true-black);
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--dark-denim);
    }

    tbody tr:hover td {
      background: var(--light-denim);
    }

    /* --- Utility --- */
    .time-tracking {
      background: var(--cork);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      margin: 1rem 0;
      border-left: 3px solid var(--dark-denim);
    }

    mark, .highlight-inline {
      background: var(--mellow);
      color: var(--true-black);
      padding: 0.05em 0.25em;
      border-radius: 2px;
    }

    /* --- Footer --- */
    .brand-footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      text-align: center;
      color: var(--dark-grey);
      font-size: 13px;
    }

    .brand-footer hr {
      background: var(--dark-denim);
      margin-bottom: 1rem;
    }

    /* --- Doc Nav Bar --- */
    .doc-nav {
      max-width: 900px;
      margin: 0 auto;
      background: var(--dark-denim);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0;
      flex-wrap: wrap;
    }

    .doc-nav a {
      color: var(--true-white);
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      padding: 0.6rem 0.85rem;
      white-space: nowrap;
      opacity: 0.75;
      transition: opacity 0.15s, background 0.15s;
      border-bottom: 2px solid transparent;
    }

    .doc-nav a:hover {
      opacity: 1;
      background: rgba(255,255,255,0.08);
      color: var(--true-white);
    }

    .doc-nav a.current {
      opacity: 1;
      border-bottom-color: var(--mellow);
      font-weight: 700;
    }

    .doc-nav .nav-demo {
      font-weight: 700;
      opacity: 1;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* --- Print --- */
    @media print {
      body { background: white; }
      .content { box-shadow: none; padding: 0; }
      .brand-header { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .doc-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="brand-header">
    <div class="tagline">
      <span class="highlight">Modern beverage runs on</span>
      <span class="brand-name">OHANAFY.</span>
    </div>
  </div>

  <div class="doc-nav" id="docNav">
    <a class="nav-demo" id="navDemo" href="#">&#8592; Demo App</a>
    <a data-doc="promotion-pricing-model" href="#">Pricing Model</a>
    <a data-doc="conflict-detection" href="#">Conflict Detection</a>
    <a data-doc="duplicate-pricing-group" href="#">Duplicate Group</a>
    <a data-doc="test-cases" href="#">Test Cases</a>
    <a data-doc="database-design" href="#">Database Design</a>
  </div>
  <script>
  (function() {
    var path = window.location.pathname;
    var segments = path.split('/');
    var docsIdx = -1;
    for (var i = segments.length - 1; i >= 0; i--) {
      if (segments[i] === 'docs') { docsIdx = i; break; }
    }
    var base;
    if (docsIdx !== -1) {
      var depth = segments.length - docsIdx - 2;
      base = '';
      for (var j = 0; j <= depth; j++) base += '../';
    } else {
      base = '';
    }
    document.getElementById('navDemo').href = base + 'demo/index.html';
    var docs = {
      'promotion-pricing-model': 'docs/promotion-pricing-model.html',
      'conflict-detection':      'docs/conflict-detection.html',
      'duplicate-pricing-group': 'docs/duplicate-pricing-group.html',
      'test-cases':              'docs/test-cases.html',
      'database-design':         'docs/technical/database-design.html'
    };
    var current = path.split('/').pop().replace('.html', '');
    var links = document.querySelectorAll('#docNav a[data-doc]');
    for (var i = 0; i < links.length; i++) {
      var key = links[i].getAttribute('data-doc');
      links[i].href = base + docs[key];
      if (key === current) links[i].classList.add('current');
    }
  })();
  </script>

  <div class="content">
    <div class="doc-title">$title$</div>
    $body$
  </div>

  <div class="brand-footer">
    <hr>
    <p>Ohanafy — The AI-Powered Operating System for Beverage</p>
  </div>
</body>
</html>
