name: "tray-discovery"
version: "0.1.0"
description: "Discovers, catalogs, and evaluates Tray.io platform connectors for Ohanafy"

model:
  default: "claude-sonnet-4-20250514"      # knowledge generation
  eval: "claude-opus-4-20250514"           # evals only
  routing: "claude-haiku-4-5-20251001"     # scoring, classification

context:
  max_tokens: 8192
  system_prompt: "prompts/system.md"

escalation:
  confidence_threshold: 0.75
  always_escalate:
    - "security"
    - "credential_exposure"
  notify_channel: "#ops-alerts"

retry:
  max_attempts: 3
  backoff_base: 2
  backoff_max: 30

discovery:
  schedule: "0 3 * * 1"
  registry_path: "registry/tray-connectors.yaml"
  knowledge_output_dir: "knowledge-base/tray-platform/connectors"
  min_relevance_score: 0.65
  auto_knowledge_threshold: 0.85
  github_repo: "ohanafy/ai-ops"
